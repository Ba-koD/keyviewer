<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Key Queue Overlay</title>
	<link rel="icon" href="/static/favicon.ico" type="image/x-icon" />
	<link rel="stylesheet" href="/static/overlay.css">
	<link rel="stylesheet" href="/static/chip.css">
	<style>
		:root {
			--bg: rgba(0,0,0,0);
			--chip-bg: #000000;
			--chip-fg: #ffffff;
			--chip-gap: 8px;
			--chip-pad-v: 10px;
			--chip-pad-h: 14px;
			--chip-radius: 10px;
			--chip-font: 24px;
			--chip-font-weight: 700;
			--fade-in: 120ms;
			--fade-out: 120ms;
			--cols: 8;
			--rows: 1;
			--single-scale: 1;
			--align: start; /* start|center|end (grid physical) - default to left (start) */
		}
		html, body { margin: 0; background: var(--bg); }
		#root { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
		.container { width: 100%; height: 100%; display:flex; align-items:center; justify-content:center; }
		.queue-wrap { width: 90vw; max-width: 96vw; }
		.queue {
			display: flex;
			flex-wrap: wrap;
			gap: var(--chip-gap, 8px);
			justify-content: var(--align, flex-start);
		}
		.chip {
			background: var(--chip-bg, rgba(0,0,0,0.6));
			color: var(--chip-fg, #ffffff);
			padding: calc(var(--chip-pad-v, 10px) * var(--single-scale, 1)) calc(var(--chip-pad-h, 14px) * var(--single-scale, 1));
			border-radius: calc(var(--chip-radius, 10px) * var(--single-scale, 1));
			font-size: calc(var(--chip-font, 24px) * var(--single-scale, 1));
			font-weight: var(--chip-font-weight, 700);
			font-family: ui-sans-serif, system-ui, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Apple Color Emoji", "Segoe UI Emoji";
			min-width: 44px; text-align: center; user-select: none; transform: translateY(0);
			transition: transform var(--fade-in) ease, opacity var(--fade-in) ease;
		}
		.chip.hide { opacity: 0; transform: translateY(8px); transition: transform var(--fade-out) ease, opacity var(--fade-out) ease; }

		/* Lightweight inline config panel (debug/use when needed) */
		.cfg-panel { position: fixed; top: 10px; left: 10px; z-index: 10000; pointer-events: auto; background: rgba(20,22,30,0.88); color: #eaeef5; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; padding: 10px; font-family: ui-sans-serif, system-ui, Segoe UI, Roboto, Arial; display: none; min-width: 260px; }
		.cfg-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
		.cfg-row label { font-size: 12px; opacity: 0.9; width: 82px; }
		.cfg-row input[type="text"] { flex: 1; min-width: 120px; background: #12141a; color: #eaeef5; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; padding: 6px 8px; font-size: 12px; }
		.cfg-row input[type="color"] { width: 36px; height: 28px; border: 1px solid rgba(255,255,255,0.22); border-radius: 4px; padding: 0; background: transparent; }
		.cfg-actions { display: flex; gap: 8px; justify-content: flex-end; }
		.cfg-btn { border: 1px solid rgba(255,255,255,0.2); background: #1a1e29; color: #eaeef5; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
		.cfg-hint { font-size: 11px; opacity: 0.75; margin-top: 4px; }
		/* Key Viewer Mode – free-form canvas */
		.kv-wrap { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
		#kv-canvas-container { position: relative; }
		.kv-chip {
			position: absolute;
			box-sizing: border-box;
			display: flex; align-items: center; justify-content: center;
			border-radius: var(--kv-chip-r, var(--chip-radius, 10px));
			font-family: ui-sans-serif, system-ui, "Segoe UI", Roboto, Arial;
			font-weight: var(--chip-font-weight, 700);
			user-select: none; text-align: center;
			background: var(--kv-chip-bg, var(--chip-bg, rgba(0,0,0,0.6)));
			color: var(--kv-chip-fg, var(--chip-fg, #ffffff));
			border: 1px solid rgba(255,255,255,0.1);
			opacity: 0.22;
			white-space: nowrap; overflow: hidden;
			transition: opacity 70ms ease, filter 70ms ease, transform 70ms ease, box-shadow 70ms ease;
		}
		.kv-chip.pressed {
			opacity: 1;
			filter: brightness(1.45);
			box-shadow: 0 0 20px rgba(255,255,255,0.4), inset 0 0 0 1px rgba(255,255,255,0.3);
			transform: scale(1.06);
		}
	</style>
</head>
<body>
	<!-- Inline config panel (appears when pressing 'c' or using ?config=1) -->
	<div id="cfgPanel" class="cfg-panel">
		<div class="cfg-row"><label>Background</label><input id="cfg_bg_hex" type="text" placeholder="#00000000" /><input id="cfg_bg" type="color" /></div>
		<div class="cfg-row"><label>Chip BG</label><input id="cfg_chip_bg_hex" type="text" placeholder="#000000" /><input id="cfg_chip_bg" type="color" /></div>
		<div class="cfg-row"><label>Text</label><input id="cfg_chip_fg_hex" type="text" placeholder="#ffffff" /><input id="cfg_chip_fg" type="color" /></div>
		<div class="cfg-actions">
			<button id="cfg_close" class="cfg-btn">Close (C)</button>
		</div>
		<div class="cfg-hint">Tip: Values save instantly. Transparent background uses rgba(0,0,0,0).</div>
	</div>
	<div id="root">
		<div class="container">
			<div class="queue-wrap"><div class="queue" id="queue"></div></div>
			<div class="kv-wrap" id="kv-wrap" style="display:none">
				<div id="kv-canvas-container"></div>
			</div>
		</div>
	</div>
	<script>
	// Injected by server at serve-time: identifies the server boot session.
	// If OBS serves a stale cached page, the WS hello message will carry a different
	// boot_id and the page will reload itself to get a fresh copy.
	const SERVER_BOOT_ID = __BOOT_ID__;
	(function(){
		const queueEl = document.getElementById('queue');
		const wrapEl = document.querySelector('.queue-wrap');
		const kvWrapEl = document.getElementById('kv-wrap');
			const kvCanvasContainer = document.getElementById('kv-canvas-container');
			let ws; let lastKeys = []; let overlayCfg = null; let didShutdown = false;
			let keyImagesConfig = null;
			let keyStyleConfig = null;
		const STORAGE_KEY_IMAGES = 'kv_key_images';
		const STORAGE_KEY_HIDE = 'kv_hide_key_text';
		const BAKED_HIDE_KEY_TEXT = {};

		function applyOverlayConfig(cfg){
			if (!cfg) return; overlayCfg = cfg; const root = document.documentElement;
			if (cfg.background) root.style.setProperty('--bg', cfg.background);
			if (cfg.chip_bg) root.style.setProperty('--chip-bg', cfg.chip_bg);
			if (cfg.chip_fg) root.style.setProperty('--chip-fg', cfg.chip_fg);
			['chip_gap','chip_pad_v','chip_pad_h','chip_radius','chip_font_px','chip_font_weight','fade_in_ms','fade_out_ms'].forEach(k=>{
				const map = {chip_gap:'--chip-gap',chip_pad_v:'--chip-pad-v',chip_pad_h:'--chip-pad-h',chip_radius:'--chip-radius',chip_font_px:'--chip-font',chip_font_weight:'--chip-font-weight',fade_in_ms:'--fade-in',fade_out_ms:'--fade-out'};
				const v = cfg[k]; 
				if (typeof v === 'number') {
					let unit = '';
					if (k.includes('ms')) unit = 'ms';
					else if (k !== 'chip_font_weight') unit = 'px';
					root.style.setProperty(map[k], v + unit);
				}
			});
			if (typeof cfg.cols === 'number') root.style.setProperty('--cols', String(cfg.cols));
			if (typeof cfg.rows === 'number') root.style.setProperty('--rows', String(cfg.rows));
			const alignMap = { left: 'start', center: 'center', right: 'end' };
			root.style.setProperty('--align', alignMap[cfg.align] || 'start');
			// Apply mode (queue vs keyviewer)
			applyMode();
		}

		async function initConfig(){
			try{
				const buster = Date.now();
				const res = await fetch('/api/overlay-config?cb=' + buster, { cache: 'no-store' });
				applyOverlayConfig(await res.json());
			}catch(e){}
		}

		async function loadKeyStyleConfig(){
			try{
				const buster = Date.now();
				const res = await fetch('/api/key-style?cb=' + buster, { cache: 'no-store' });
				keyStyleConfig = await res.json();
				if (isKeyViewerMode()) renderKeyViewerFree(lastKeys);
				else placeChips(lastKeys, true);
			}catch(e){}
		}

		async function loadKeyImagesConfig(){
			try{
				const buster = Date.now();
				const res = await fetch('/api/key-images?cb=' + buster, { cache: 'no-store' });
				keyImagesConfig = await res.json();
				if (isKeyViewerMode()) renderKeyViewerFree(lastKeys);
				else placeChips(lastKeys, true);
			}catch(e){}
		}

		// --- Style priority = strict array order (index 0 = highest priority) ---
		function resolveChipStyle(key) {
			// Pick per-mode groups (queue or keyviewer), fallback to legacy rawStyleGroups
			const mode = overlayCfg?.overlay_mode || 'queue';
			let groups = mode === 'keyviewer'
				? keyStyleConfig?.rawStyleGroupsKv
				: keyStyleConfig?.rawStyleGroupsQueue;
			if (!Array.isArray(groups) || groups.length === 0) {
				groups = keyStyleConfig?.rawStyleGroups; // legacy fallback
			}
			if (Array.isArray(groups) && groups.length > 0) {
				// Strict array order: first matching group wins (index 0 = highest priority)
				for (const g of groups) {
					if (g.type !== 'all' && !(g.keys?.includes(key))) continue;
					// Per-group chip size + font overrides (null = use global default)
					const overrides = {
						chipPadV: g.chipPadV ?? null,
						chipPadH: g.chipPadH ?? null,
						chipRadius: g.chipRadius ?? null,
						fontFamily: g.fontFamily || null,
						fontSize: g.fontSize || null,
						fontWeight: g.fontWeight || null,
						fontColor: g.fontColor || null
					};
					// Found the matching group – extract style
					if (g.bgMode === 'image' && g.image) {
						return { kind: 'image', image: g.image, textColor: g.textColor, textOpacity: g.textOpacity, ...overrides };
					}
					if (g.bgMode === 'gradient') {
						let css;
						if (g.gradStops?.length >= 2) {
							const s = [...g.gradStops].sort((a,b) => a.position - b.position);
							css = `linear-gradient(${g.gradAngle||180}deg,${s.map(x=>`${x.color} ${x.position}%`).join(',')})`;;
						} else {
							css = `linear-gradient(${g.gradAngle||180}deg,${g.gradColor1||'#000'},${g.gradColor2||'#333'})`;
						}
						return { kind: 'color', color: css, ...overrides };
					}
					if (g.bgMode === 'solid' && g.bgColor) {
						return { kind: 'color', color: g.bgColor, ...overrides };
					}
					// transparent or no bg – still return overrides
					return { kind: 'none', ...overrides };
				}
			}
			// Fall back to keyImagesConfig (legacy)
			if (!keyImagesConfig) return null;
			if (keyImagesConfig.individual?.[key]) return { kind: 'image', ...keyImagesConfig.individual[key] };
			if (keyImagesConfig.groups) {
				for (const g of keyImagesConfig.groups) {
					if (g.keys?.includes(key)) return { kind: 'image', ...g };
				}
			}
			if (keyImagesConfig.allKeys) return { kind: 'image', ...keyImagesConfig.allKeys };
			return null;
		}

		function getHideKeyTextMap() {
			let localHideMap = {};
			try { localHideMap = JSON.parse(localStorage.getItem(STORAGE_KEY_HIDE) || '{}'); } catch(e) {}
			if (BAKED_HIDE_KEY_TEXT && Object.keys(BAKED_HIDE_KEY_TEXT).length > 0) {
				return { ...localHideMap, ...BAKED_HIDE_KEY_TEXT };
			}
			return localHideMap;
		}

		function isKeyTextHidden(key, style, hideMap) {
			const kiHide = hideMap[key] !== undefined ? !!hideMap[key] : !!hideMap['default'];
			return kiHide || (typeof style?.textOpacity === 'number' && style.textOpacity === 0);
		}

		function applyResolvedChipStyle(el, key, style, hideMap, { keyViewer = false } = {}) {
			el.style.background = '';
			el.style.backgroundImage = '';
			el.style.backgroundSize = '';
			el.style.backgroundPosition = '';
			el.style.color = '';
			el.style.borderRadius = '';
			el.style.fontFamily = '';
			el.style.fontWeight = '';
			el.style.textShadow = '';
			if (!keyViewer) {
				el.style.paddingTop = '';
				el.style.paddingBottom = '';
				el.style.paddingLeft = '';
				el.style.paddingRight = '';
				el.style.fontSize = '';
			}

			if (style?.kind === 'image' && style.image) {
				el.style.backgroundImage = `url(${style.image})`;
				el.style.backgroundSize = 'cover';
				el.style.backgroundPosition = 'center';
				let tc = style.textColor || 'rgba(255,255,255,1)';
				if (typeof style.textOpacity === 'number' && style.textOpacity > 0) tc = hexToRgba(tc, style.textOpacity);
				el.style.color = tc;
			} else if (style?.kind === 'color') {
				el.style.background = style.color;
			}

			if (style?.chipPadV != null && !keyViewer) el.style.paddingTop = el.style.paddingBottom = style.chipPadV + 'px';
			if (style?.chipPadH != null && !keyViewer) el.style.paddingLeft = el.style.paddingRight = style.chipPadH + 'px';
			if (style?.chipRadius != null) el.style.borderRadius = style.chipRadius + 'px';
			if (style?.fontFamily) el.style.fontFamily = style.fontFamily;
			if (style?.fontWeight) el.style.fontWeight = style.fontWeight;
			if (style?.fontSize && !keyViewer) el.style.fontSize = style.fontSize + 'px';
			if (style?.fontColor) el.style.color = style.fontColor;

			if (isKeyTextHidden(key, style, hideMap)) {
				el.style.color = 'transparent';
				el.style.textShadow = 'none';
			}
		}

		function placeChips(keys, forceRender = false){
			try {
				const current = Array.from(queueEl.children).map(c => c.dataset.key || '');
				if (!forceRender && current.length === keys.length && current.every((v,i)=> v === keys[i])) return;
			} catch(e){}
			queueEl.innerHTML = '';
			const cols = Number(overlayCfg?.cols ?? 8); const rows = Number(overlayCfg?.rows ?? 1);
			let toShow = keys;
			if (rows > 0){ const cap = Math.max(1, cols * rows); toShow = keys.slice(Math.max(0, keys.length - cap)); }
			if (overlayCfg?.direction === 'rtl') toShow = Array.from(toShow).reverse();
			const kiHideMap = getHideKeyTextMap();
			toShow.forEach(k => {
				const chip = document.createElement('div');
				chip.className = 'chip';
				chip.dataset.key = k;
				chip.textContent = k;
				const style = resolveChipStyle(k);
				applyResolvedChipStyle(chip, k, style, kiHideMap);
				queueEl.appendChild(chip);
			});
		}

		// --- Key Viewer Mode – free-form canvas ---
		function isKeyViewerMode() {
			return overlayCfg?.overlay_mode === 'keyviewer';
		}

		function applyMode() {
			if (isKeyViewerMode()) {
				if (wrapEl) wrapEl.style.display = 'none';
				kvWrapEl.style.display = 'flex';
				renderKeyViewerFree(lastKeys);
			} else {
				if (wrapEl) wrapEl.style.display = 'block';
				kvWrapEl.style.display = 'none';
				placeChips(lastKeys);
			}
		}

		function renderKeyViewerFree(pressedKeys) {
			if (!kvCanvasContainer) return;
			const layout = keyStyleConfig?.keyViewerLayout || [];
			const canvasW = keyStyleConfig?.kvCanvasW || 800;
			const canvasH = keyStyleConfig?.kvCanvasH || 300;
			const pressed = new Set(pressedKeys);
			const kiHideMap = getHideKeyTextMap();

			// Fit canvas into viewport, maintaining aspect ratio
			const vw = kvWrapEl.clientWidth || 800;
			const vh = kvWrapEl.clientHeight || 300;
			const scale = Math.min(vw / canvasW, vh / canvasH);
			const displayW = canvasW * scale;
			const displayH = canvasH * scale;
			kvCanvasContainer.style.width = displayW + 'px';
			kvCanvasContainer.style.height = displayH + 'px';

			// Only rebuild DOM when layout changes
			const layoutSig = JSON.stringify(layout) + canvasW + ',' + canvasH;
			if (kvCanvasContainer._layoutSig !== layoutSig) {
				kvCanvasContainer._layoutSig = layoutSig;
				kvCanvasContainer.innerHTML = '';
				layout.forEach(chip => {
					const el = document.createElement('div');
					el.className = 'kv-chip';
					el.dataset.key = chip.key;
					el.dataset.id = chip.id;
					el.textContent = chip.key;
					// Position/size as percentage of canvas
					el.style.left = (chip.x / canvasW * 100) + '%';
					el.style.top = (chip.y / canvasH * 100) + '%';
					el.style.width = (chip.w / canvasW * 100) + '%';
					el.style.height = (chip.h / canvasH * 100) + '%';
					// Scale font with chip height
					el.style.fontSize = Math.max(9, chip.h * scale * 0.38) + 'px';
					// Per-chip style overrides
					if (chip.bgOverride) el.style.setProperty('--kv-chip-bg', chip.bgOverride);
					if (chip.fgOverride) el.style.setProperty('--kv-chip-fg', chip.fgOverride);
					if (chip.radiusOverride != null) el.style.borderRadius = chip.radiusOverride + 'px';
					kvCanvasContainer.appendChild(el);
				});
			}

			// Update pressed state + re-scale fonts if canvas resized
			kvCanvasContainer.querySelectorAll('.kv-chip').forEach(el => {
				el.classList.toggle('pressed', pressed.has(el.dataset.key));
				// Re-apply font scale if viewport changed
				const chip = layout.find(c => c.id === el.dataset.id);
				if (!chip) return;
				const style = resolveChipStyle(chip.key);
				applyResolvedChipStyle(el, chip.key, style, kiHideMap, { keyViewer: true });
				el.style.fontSize = Math.max(9, chip.h * scale * 0.38) + 'px';
				if (chip.bgOverride) {
					el.style.background = chip.bgOverride;
					el.style.backgroundImage = '';
				}
				if (chip.fgOverride && !isKeyTextHidden(chip.key, style, kiHideMap)) {
					el.style.color = chip.fgOverride;
				}
				if (chip.radiusOverride != null) el.style.borderRadius = chip.radiusOverride + 'px';
				if (isKeyTextHidden(chip.key, style, kiHideMap)) {
					el.style.color = 'transparent';
					el.style.textShadow = 'none';
				}
			});
		}

		// --- Helper functions ---
		function hexToRgba(hex, opacity) {
			// Convert hex color to rgba with opacity (0-1)
			if (!hex) return `rgba(255,255,255,${opacity})`;
			if (hex.startsWith('rgba') || hex.startsWith('rgb')) return hex; // Already rgba
			let r = 255, g = 255, b = 255;
			if (hex.startsWith('#')) {
				const h = hex.slice(1);
				if (h.length === 3) {
					r = parseInt(h[0] + h[0], 16);
					g = parseInt(h[1] + h[1], 16);
					b = parseInt(h[2] + h[2], 16);
				} else if (h.length >= 6) {
					r = parseInt(h.slice(0, 2), 16);
					g = parseInt(h.slice(2, 4), 16);
					b = parseInt(h.slice(4, 6), 16);
				}
			}
			return `rgba(${r},${g},${b},${opacity})`;
		}

		// --- Inline config panel (color pickers + hex) ---
		function isValidHex(h){ return /^#([0-9a-fA-F]{6}|[0-9a-fA-F]{8}|[0-9a-fA-F]{3})$/.test(h); }
		function hexTo6(h){
			// Normalize 3/6/8-digit hex to 6-digit without alpha for <input type="color">
			if (!h || !h.startsWith('#')) return '#000000';
			let v = h.slice(1);
			if (v.length === 3) v = v.split('').map(c=>c+c).join('');
			if (v.length === 8) v = v.slice(0,6);
			if (v.length < 6) v = (v + '000000').slice(0,6);
			return '#' + v;
		}
		function applyAndSaveColors(next){
			if (!overlayCfg) return;
			const root = document.documentElement;
			if (typeof next.background === 'string') {
				// Allow transparent keyword or rgba(0,0,0,0)
				const bgVal = next.background.trim().toLowerCase() === 'transparent' ? 'rgba(0,0,0,0)' : next.background;
				root.style.setProperty('--bg', bgVal);
				overlayCfg.background = bgVal;
			}
			if (typeof next.chip_bg === 'string') { root.style.setProperty('--chip-bg', next.chip_bg); overlayCfg.chip_bg = next.chip_bg; }
			if (typeof next.chip_fg === 'string') { root.style.setProperty('--chip-fg', next.chip_fg); overlayCfg.chip_fg = next.chip_fg; }
			// Persist full config so OBS reload is consistent
			const payload = Object.assign({}, overlayCfg);
			fetch('/api/overlay-config', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) }).catch(()=>{});
		}

		function setupConfigPanel(){
			const panel = document.getElementById('cfgPanel');
			const bgHex = document.getElementById('cfg_bg_hex');
			const bgPick = document.getElementById('cfg_bg');
			const chipBgHex = document.getElementById('cfg_chip_bg_hex');
			const chipBgPick = document.getElementById('cfg_chip_bg');
			const chipFgHex = document.getElementById('cfg_chip_fg_hex');
			const chipFgPick = document.getElementById('cfg_chip_fg');
			const closeBtn = document.getElementById('cfg_close');

			function syncFromCfg(){
				if (!overlayCfg) return;
				bgHex.value = overlayCfg.background || 'rgba(0,0,0,0)';
				bgPick.value = hexTo6(bgHex.value.startsWith('#') ? bgHex.value : '#000000');
				chipBgHex.value = overlayCfg.chip_bg || '#000000';
				chipBgPick.value = hexTo6(chipBgHex.value || '#000000');
				chipFgHex.value = overlayCfg.chip_fg || '#ffffff';
				chipFgPick.value = hexTo6(chipFgHex.value || '#ffffff');
			}

			let saveTimer = null;
			function scheduleSave(next){
				if (saveTimer) clearTimeout(saveTimer);
				saveTimer = setTimeout(()=> applyAndSaveColors(next), 200);
			}

			bgHex.addEventListener('input', ()=>{
				const v = bgHex.value.trim();
				if (v.toLowerCase() === 'transparent' || v.startsWith('rgba')) {
					bgPick.value = '#000000';
					scheduleSave({ background: v });
				} else if (isValidHex(v)) {
					bgPick.value = hexTo6(v);
					scheduleSave({ background: v });
				}
			});
			bgPick.addEventListener('input', ()=>{
				bgHex.value = bgPick.value;
				scheduleSave({ background: bgHex.value });
			});

			chipBgHex.addEventListener('input', ()=>{
				const v = chipBgHex.value.trim();
				if (isValidHex(v)) { chipBgPick.value = hexTo6(v); scheduleSave({ chip_bg: v }); }
			});
			chipBgPick.addEventListener('input', ()=>{
				chipBgHex.value = chipBgPick.value;
				scheduleSave({ chip_bg: chipBgHex.value });
			});

			chipFgHex.addEventListener('input', ()=>{
				const v = chipFgHex.value.trim();
				if (isValidHex(v)) { chipFgPick.value = hexTo6(v); scheduleSave({ chip_fg: v }); }
			});
			chipFgPick.addEventListener('input', ()=>{
				chipFgHex.value = chipFgPick.value;
				scheduleSave({ chip_fg: chipFgHex.value });
			});

			closeBtn.addEventListener('click', ()=>{ panel.style.display = 'none'; });
			document.addEventListener('keydown', (ev)=>{ if (ev.key === 'c' || ev.key === 'C') { panel.style.display = (panel.style.display === 'none' || !panel.style.display) ? 'block' : 'none'; if (panel.style.display === 'block') syncFromCfg(); } });

			const usp = new URLSearchParams(location.search);
			if (usp.get('config') === '1') { panel.style.display = 'block'; syncFromCfg(); }
		}

		function connect(){
			const url = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws';
			ws = new WebSocket(url);
			ws.onopen = () => {
				// Fallback: if we previously received a shutdown event, reload unconditionally.
				if (didShutdown) { location.reload(); return; }
			};
			ws.onmessage = (ev) => { 
				try { 
					const data = JSON.parse(ev.data);
					if (data.type === 'hello') {
						// Primary cache-bust check: if the server's boot_id differs from the one
						// baked into this page, OBS is serving a stale cached copy → force reload.
						if (data.boot_id !== undefined && data.boot_id !== SERVER_BOOT_ID) {
							location.reload();
							return;
						}
						if (Array.isArray(data.keys)) { lastKeys = data.keys; applyMode(); }
						return;
					}
					if (data.type === 'shutdown') {
						didShutdown = true;
						return;
					}
					if (data.type === 'config' && data.overlay){ 
						applyOverlayConfig(data.overlay); 
						return; 
					} 
					if (Array.isArray(data.keys)) { 
						lastKeys = data.keys; 
						applyMode();
					} 
				} catch(e){} 
			};
			ws.onclose = () => { setTimeout(connect, 1000); };
		}

		// Listen for localStorage changes (from control.html)
		window.addEventListener('storage', (e) => {
			if (e.key === STORAGE_KEY_IMAGES || e.key === STORAGE_KEY_HIDE) {
				if (isKeyViewerMode()) renderKeyViewerFree(lastKeys);
				else placeChips(lastKeys, true);
			}
		});

		Promise.all([initConfig(), loadKeyImagesConfig(), loadKeyStyleConfig()]).then(()=> setupConfigPanel()); connect();
		
		// Periodically refresh key images config (every 5 seconds)
		setInterval(loadKeyImagesConfig, 5000);
		setInterval(loadKeyStyleConfig, 5000);
	})();
	</script>
</body>
</html>
